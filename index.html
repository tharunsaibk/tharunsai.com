<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio · Coming Soon</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #0a0a14;
        --bg-1: #14132a;
        --accent-1: #8b5cf6;
        --accent-2: #6366f1;
        --accent-3: #22d3ee;
        --text-primary: #f5f5f7;
        --text-muted: rgba(245, 245, 247, 0.55);
        --text-faint: rgba(245, 245, 247, 0.35);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-0);
        color: var(--text-primary);
        display: grid;
        place-items: center;
        position: relative;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Animated gradient background */
      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse at 20% 30%,
            rgba(139, 92, 246, 0.35),
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(99, 102, 241, 0.3),
            transparent 50%
          ),
          radial-gradient(
            ellipse at 60% 80%,
            rgba(34, 211, 238, 0.2),
            transparent 50%
          ),
          linear-gradient(135deg, var(--bg-0) 0%, var(--bg-1) 100%);
        animation: drift 18s ease-in-out infinite alternate;
      }

      @keyframes drift {
        0% {
          background-position:
            0% 0%,
            100% 0%,
            50% 100%,
            0% 0%;
          filter: hue-rotate(0deg);
        }
        100% {
          background-position:
            10% 20%,
            80% 30%,
            40% 70%,
            0% 0%;
          filter: hue-rotate(20deg);
        }
      }

      /* Subtle grain overlay for texture */
      .grain {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.05;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
      }

      main {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 2rem;
        animation: fadeIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .eyebrow {
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--text-faint);
        margin-bottom: 1.75rem;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
      }

      .eyebrow::before {
        content: "";
        width: 28px;
        height: 1px;
        background: var(--text-faint);
      }

      h1 {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 300;
        font-size: clamp(3.5rem, 12vw, 8rem);
        letter-spacing: -0.02em;
        line-height: 1;
        background: linear-gradient(
          135deg,
          var(--text-primary) 0%,
          var(--accent-1) 60%,
          var(--accent-3) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1.25rem;
      }

      .subtitle {
        font-size: clamp(0.95rem, 1.6vw, 1.1rem);
        font-weight: 400;
        color: var(--text-muted);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 2.5rem;
      }

      .subtitle .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-1);
        box-shadow: 0 0 12px var(--accent-1);
        animation: pulse 1.8s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
          transform: scale(0.85);
        }
        50% {
          opacity: 1;
          transform: scale(1.1);
        }
      }

      .tagline {
        font-size: 0.95rem;
        font-weight: 300;
        color: var(--text-muted);
        max-width: 28rem;
        margin: 0 auto;
        line-height: 1.7;
      }

      footer {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-faint);
      }

      @media (max-width: 480px) {
        .eyebrow {
          font-size: 0.7rem;
          letter-spacing: 0.28em;
        }
        .subtitle {
          letter-spacing: 0.15em;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .bg,
        main,
        .subtitle .dot {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <main>
      <p class="eyebrow">Portfolio</p>
      <h1>Coming&nbsp;Soon</h1>
      <p class="subtitle">
        <span class="dot" aria-hidden="true"></span>
        In&nbsp;the&nbsp;making
      </p>
      <p class="tagline">
        A new space is being crafted — thoughtfully, slowly, and with care.
        Check back soon.
      </p>
    </main>

    <footer>© 2026</footer>
  </body>
</html>
